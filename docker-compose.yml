version: "3.9"

services:

  mongodb:
    image: mongo:6
    container_name: farmer_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: farmer_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: farmer_backend
    restart: always
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend/web
    container_name: farmer_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest
    container_name: farmer_nginx
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
